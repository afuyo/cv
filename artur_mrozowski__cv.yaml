      - bullet: Lead Enterprise Architecture Program on Azure — Microsoft (2017)
      - bullet: Data Modelling Master Class — Steve Hoberman (2016)
      - bullet: Data Vault Certified Data Modeler (DVCDM) (2014)
      - bullet: CDMP Preparation (2024)

    education:
      - name: Lund University
        degree: Bachelor of Science, System Analysis
        institution: Lund University
        area: System Analysis
        highlights:
          - "Faculty of Informatics."
          - "Key areas: Database systems, data modeling, software architecture, UML, object-oriented design, Java programming, algorithms, and data structures."

    additional_education:
